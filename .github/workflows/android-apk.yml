name: Android APK Build

on:
  push:
    branches:
      - main
      - preview
    paths:
      - "frontend/android/**"
      - "frontend/ios/**"
      - "frontend/app.json"
      - "frontend/eas.json"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/babel.config.js"
      - "frontend/metro.config.js"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest
          expo-version: latest

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Inject Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > frontend/google-services.json
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f frontend/google-services.json
          git commit -m "chore: temp commit secret for EAS tarball"

      - name: Build Development APK
        env:
          _JAVA_OPTIONS: "-Xmx4g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
        working-directory: ./frontend
        run: |
          eas build \
            --platform android \
            --profile development \
            --local \
            --non-interactive \
            --output ./gems-dev.apk

      - name: Build Preview APK
        env:
          _JAVA_OPTIONS: "-Xmx4g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
        working-directory: ./frontend
        run: |
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./gems-preview.apk

      - name: Upload Development APK
        uses: actions/upload-artifact@v4
        with:
          name: gems-dev-apk
          path: ./frontend/gems-dev.apk
          retention-days: 30

      - name: Upload Preview APK
        uses: actions/upload-artifact@v4
        with:
          name: gems-preview-apk
          path: ./frontend/gems-preview.apk
          retention-days: 30

      - name: Summary
        run: |
          DEV_SIZE=$(du -h ./frontend/gems-dev.apk | cut -f1)
          PREVIEW_SIZE=$(du -h ./frontend/gems-preview.apk | cut -f1)
          echo "## APK Builds Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Development | $DEV_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview | $PREVIEW_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
